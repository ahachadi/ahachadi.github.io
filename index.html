<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      background: linear-gradient(to bottom, #000000, #555555);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .transparent-box {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      color: #fff;
      backdrop-filter: blur(10px);
    }

    svg.icon {
      width: 30px;
      height: 30px;
      fill: currentColor;
      margin: 0 10px;
    }

    .social-icons {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="transparent-box">
    <h1>Abdelaziz Hachadi</h1>
    <p>ML / DL Portfolio</p>

    <!-- Social Icons -->
    <div class="social-icons">
      <svg class="icon">
        <use href="#instagram"></use>
      </svg>
      <svg class="icon">
        <use href="#facebook"></use>
      </svg>
      <svg class="icon">
        <use href="#twitter"></use>
      </svg>
      <svg class="icon">
        <use href="#youtube"></use>
      </svg>
    </div>
  </div>

  <!-- SVG Sprite -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <symbol id="instagram" viewBox="0 0 15 15">
      <path fill="none" stroke="currentColor"
        d="M11 3.5h1M4.5.5h6a4 4 0 0 1 4 4v6a4 4 0 0 1-4 4h-6a4 4 0 0 1-4-4v-6a4 4 0 0 1 4-4Zm3 10a3 3 0 1 1 0-6a3 3 0 0 1 0 6Z" />
    </symbol>

    <symbol id="facebook" viewBox="0 0 15 15">
      <path fill="none" stroke="currentColor"
        d="M7.5 14.5a7 7 0 1 1 0-14a7 7 0 0 1 0 14Zm0 0v-8a2 2 0 0 1 2-2h.5m-5 4h5" />
    </symbol>

    <symbol id="twitter" viewBox="0 0 15 15">
      <path fill="currentColor"
        d="m14.478 1.5l.5-.033a.5.5 0 0 0-.871-.301l.371.334Zm-.498 2.959a.5.5 0 1 0-1 0h1Zm-6.49.082h-.5h.5Zm0 .959h.5h-.5Zm-6.99 7V12a.5.5 0 0 0-.278.916L.5 12.5Zm.998-11l.469-.175a.5.5 0 0 0-.916-.048l.447.223Z" />
    </symbol>

    <symbol id="youtube" viewBox="0 0 15 15">
      <path fill="currentColor"
        d="M5.669 4.76a1.469 1.469 0 0 1 2.04-1.177c1.062.454 3.442 1.533 6.462 3.276c3.021 1.744 5.146 3.267 6.069 3.958c.788.591.79 1.763.001 2.356c-.914.687-3.013 2.19-6.07 3.956c-3.06 1.766-5.412 2.832-6.464 3.28c-.906.387-1.92-.2-2.038-1.177c-.138-1.142-.396-3.735-.396-7.237c0-3.5.257-6.092.396-7.235Z" />
    </symbol>
  </svg>
</body>

</html>
